{% extends 'base.html' %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-lg-8">
        <div class="card shadow-sm border-0">
            <div class="card-header bg-white py-3">
                <h4 class="mb-0 text-primary fw-bold">編輯食譜</h4>
            </div>
            <div class="card-body p-4">
                <!-- 更新表單的 action 是 POST 傳送到 edit_recipe 路徑 -->
                <form action="{{ url_for('recipe.edit_recipe', id=recipe.id) }}" method="POST">
                    <div class="mb-3">
                        <label for="title" class="form-label fw-bold">食譜名稱 <span class="text-danger">*</span></label>
                        <input type="text" class="form-control border-primary-subtle" id="title" name="title" value="{{ recipe.title }}" required>
                    </div>
                    <div class="mb-3">
                        <label for="ingredients" class="form-label fw-bold">材料清單 <span class="text-danger">*</span></label>
                        <textarea class="form-control border-primary-subtle" id="ingredients" name="ingredients" rows="5" required>{{ recipe.ingredients }}</textarea>
                    </div>
                    <div class="mb-4">
                        <label for="steps" class="form-label fw-bold">烹飪步驟 <span class="text-danger">*</span></label>
                        <textarea class="form-control border-primary-subtle" id="steps" name="steps" rows="8" required>{{ recipe.steps }}</textarea>
                    </div>
                    <div class="d-flex justify-content-between pt-2 border-top">
                        <a href="{{ url_for('recipe.detail', id=recipe.id) }}" class="btn btn-outline-secondary mt-3">取消返回</a>
                        <button type="submit" class="btn btn-primary px-4 mt-3">更新食譜</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
